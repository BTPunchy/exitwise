version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: exitwise_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exitwisedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exitwise_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - ai_service

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: exitwise_ai_service
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

volumes:
  postgres_data:
